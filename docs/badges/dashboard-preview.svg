<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="760" height="420" fill="url(#bg)" rx="8"/>
  <rect x="0" y="0" width="760" height="420" fill="none" stroke="#30363d" stroke-width="1" rx="8"/>

  <!-- Banner -->
  <rect x="16" y="16" width="728" height="36" fill="url(#cbg)" rx="6"/>
  <rect x="16" y="16" width="4" height="36" fill="#f78166" rx="2"/>
  <text x="28" y="38" fill="#e6edf3" font-size="12" font-weight="600">GitHub Traffic Tracker</text>
  <text x="720" y="38" fill="#8b949e" font-size="11" text-anchor="end">View repository →</text>

  <!-- Title area (centered) -->
  <text x="380" y="78" fill="#e6edf3" font-size="20" font-weight="600" text-anchor="middle">Traffic-Dashboard — Traffic Dashboard</text>
  <text x="380" y="96" fill="#8b949e" font-size="12" text-anchor="middle">Downloads, clones, views, and community insights</text>

  <!-- Tab bar -->
  <rect x="0" y="112" width="760" height="34" fill="#0d1117"/>
  <text x="20" y="134" fill="#e6edf3" font-size="13" font-weight="600">Overview</text>
  <text x="104" y="134" fill="#58a6ff" font-size="13">Installs</text>
  <text x="180" y="134" fill="#8b949e" font-size="13">Views</text>
  <text x="244" y="134" fill="#8b949e" font-size="13">Community</text>
  <text x="332" y="134" fill="#8b949e" font-size="13">Dev</text>
  <rect x="20" y="146" width="56" height="2" fill="#f78166" rx="1"/>

  <!-- Installs tab: stat cards -->
  <rect x="16" y="160" width="172" height="56" fill="url(#cbg)" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="102" y="180" fill="#8b949e" font-size="10" text-anchor="middle">Total Installs</text>
  <text x="102" y="200" fill="#e6edf3" font-size="16" font-weight="600" text-anchor="middle">1,847</text>
  <text x="102" y="212" fill="#8b949e" font-size="9" text-anchor="middle">downloads + clones</text>

  <rect x="200" y="160" width="172" height="56" fill="url(#cbg)" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="286" y="180" fill="#8b949e" font-size="10" text-anchor="middle">Release Downloads</text>
  <text x="286" y="204" fill="#e6edf3" font-size="16" font-weight="600" text-anchor="middle">—</text>

  <rect x="384" y="160" width="172" height="56" fill="url(#cbg)" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="470" y="180" fill="#8b949e" font-size="10" text-anchor="middle">Clones</text>
  <text x="470" y="200" fill="#e6edf3" font-size="16" font-weight="600" text-anchor="middle">892</text>
  <text x="470" y="212" fill="#8b949e" font-size="9" text-anchor="middle">1.0k tracked unique</text>

  <rect x="568" y="160" width="176" height="56" fill="url(#cbg)" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="656" y="180" fill="#8b949e" font-size="10" text-anchor="middle">Views</text>
  <text x="656" y="200" fill="#e6edf3" font-size="16" font-weight="600" text-anchor="middle">3,421</text>

  <!-- Combined Daily Activity -->
  <text x="16" y="244" fill="#e6edf3" font-size="14" font-weight="600">Combined Daily Activity (all metrics)</text>

  <!-- Toggles (blue box + white tick = checked, outline = unchecked) -->
  <rect x="16" y="254" width="14" height="14" fill="#1f6feb" rx="3"/>
  <polyline points="19,261 22,264 27,257" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="36" y="265" fill="#e6edf3" font-size="10">Views</text>
  <rect x="88" y="254" width="14" height="14" fill="#1c2128" rx="3" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="265" fill="#8b949e" font-size="10">Unique Views</text>
  <rect x="200" y="254" width="14" height="14" fill="#1f6feb" rx="3"/>
  <polyline points="203,261 206,264 211,257" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="220" y="265" fill="#e6edf3" font-size="10">Clones</text>
  <rect x="280" y="254" width="14" height="14" fill="#1c2128" rx="3" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="265" fill="#8b949e" font-size="10">Unique Clones</text>
  <rect x="400" y="254" width="14" height="14" fill="#1f6feb" rx="3"/>
  <polyline points="403,261 406,264 411,257" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="420" y="265" fill="#e6edf3" font-size="10">Downloads</text>
  <rect x="500" y="254" width="14" height="14" fill="#1f6feb" rx="3"/>
  <polyline points="503,261 506,264 511,257" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="520" y="265" fill="#e6edf3" font-size="10">Total Installs (area)</text>

  <!-- Chart card -->
  <rect x="16" y="276" width="728" height="128" fill="url(#cbg)" rx="6" stroke="#30363d" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="36" y1="290" x2="720" y2="290" stroke="#30363d" stroke-width="0.5"/>
  <line x1="36" y1="310" x2="720" y2="310" stroke="#30363d" stroke-width="0.5"/>
  <line x1="36" y1="330" x2="720" y2="330" stroke="#30363d" stroke-width="0.5"/>
  <line x1="36" y1="350" x2="720" y2="350" stroke="#30363d" stroke-width="0.5"/>
  <line x1="36" y1="370" x2="720" y2="370" stroke="#30363d" stroke-width="0.5"/>
  <line x1="36" y1="390" x2="720" y2="390" stroke="#30363d" stroke-width="0.5"/>

  <!-- Area fill under Installs line -->
  <polygon points="37,370 61,340 85,356 109,328 133,366 157,338 181,354 205,318 229,344 253,376 277,350 301,332 325,360 349,346 349,390 37,390"
    fill="url(#area)"/>

  <!-- Installs line (blue, thickest) -->
  <polyline points="37,370 61,340 85,356 109,328 133,366 157,338 181,354 205,318 229,344 253,376 277,350 301,332 325,360 349,346"
    fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>

  <!-- Views line (blue, dashed, thinner) -->
  <polyline points="37,362 61,356 85,360 109,348 133,358 157,350 181,348 205,340 229,354 253,368 277,358 301,346 325,352 349,340"
    fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>

  <!-- Clones line (purple) -->
  <polyline points="37,378 61,348 85,364 109,336 133,374 157,344 181,360 205,326 229,350 253,382 277,356 301,338 325,366 349,352"
    fill="none" stroke="#bc8cff" stroke-width="2" opacity="0.8"/>

  <!-- Downloads line (green) -->
  <polyline points="37,384 61,372 85,376 109,368 133,380 157,370 181,374 205,362 229,372 253,386 277,378 301,364 325,370 349,360"
    fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>

  <!-- X-axis dates -->
  <text x="37" y="396" fill="#8b949e" font-size="8" text-anchor="middle">Jun 5</text>
  <text x="85" y="396" fill="#8b949e" font-size="8" text-anchor="middle">Jun 7</text>
  <text x="150" y="396" fill="#8b949e" font-size="8" text-anchor="middle">Jun 9</text>
  <text x="222" y="396" fill="#8b949e" font-size="8" text-anchor="middle">Jun 11</text>
  <text x="301" y="396" fill="#8b949e" font-size="8" text-anchor="middle">Jun 13</text>

  <!-- Legend -->
  <rect x="440" y="358" width="8" height="8" fill="#58a6ff" rx="2"/>
  <text x="454" y="365" fill="#8b949e" font-size="9">Installs</text>
  <rect x="510" y="358" width="8" height="8" fill="#bc8cff" rx="2"/>
  <text x="524" y="365" fill="#8b949e" font-size="9">Clones</text>
  <rect x="580" y="358" width="8" height="8" fill="#3fb950" rx="2"/>
  <text x="594" y="365" fill="#8b949e" font-size="9">Downloads</text>
</svg>
